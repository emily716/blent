<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 90" width="300" height="90">
  <defs>
    <!-- Bubble gradients -->
    <radialGradient id="v1-body" cx="38%" cy="32%" r="65%">
      <stop offset="0%"   stop-color="#C4B5FF" stop-opacity="0.55"/>
      <stop offset="45%"  stop-color="#7B5EFF" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#3A1FBB" stop-opacity="0.45"/>
    </radialGradient>
    <radialGradient id="v1-spec" cx="38%" cy="22%" r="45%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.92"/>
      <stop offset="60%"  stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="v1-refl" cx="50%" cy="88%" r="45%">
      <stop offset="0%"   stop-color="#B8F05A" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#B8F05A" stop-opacity="0"/>
    </radialGradient>

    <!-- Glass text gradient — light at top, deep at bottom -->
    <linearGradient id="v1-text-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#DDD5FF" stop-opacity="1"/>
      <stop offset="30%"  stop-color="#A892FF" stop-opacity="1"/>
      <stop offset="100%" stop-color="#4A28C8" stop-opacity="1"/>
    </linearGradient>

    <!-- Clip path uses text shape for highlight overlay -->
    <clipPath id="v1-text-clip">
      <text x="92" y="57"
        font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-weight="800" font-size="40" letter-spacing="-2">blent</text>
    </clipPath>

    <filter id="v1-shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="4" stdDeviation="6"
        flood-color="#5533CC" flood-opacity="0.28"/>
    </filter>
    <filter id="v1-text-glow" x="-5%" y="-20%" width="110%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4"
        flood-color="#7B5EFF" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- Bubble -->
  <circle cx="44" cy="44" r="36"
    fill="none" stroke="#7B5EFF" stroke-width="1" opacity="0.18"/>
  <circle cx="44" cy="44" r="33"
    fill="url(#v1-body)"
    stroke="#C4B5FF" stroke-width="0.8" stroke-opacity="0.6"
    filter="url(#v1-shadow)"/>
  <circle cx="44" cy="44" r="33" fill="url(#v1-refl)"/>
  <ellipse cx="35" cy="30" rx="16" ry="10" fill="url(#v1-spec)"/>
  <ellipse cx="31" cy="26" rx="5" ry="3" fill="white" opacity="0.75"/>
  <path d="M 62 55 A 33 33 0 0 1 26 68"
    fill="none" stroke="white" stroke-width="0.8"
    stroke-opacity="0.22" stroke-linecap="round"/>

  <!-- Glass text: gradient fill + glow -->
  <text x="92" y="57"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-weight="800" font-size="40" letter-spacing="-2"
    fill="url(#v1-text-grad)"
    filter="url(#v1-text-glow)">blent</text>

  <!-- White specular highlight clipped to text shape -->
  <rect x="92" y="17" width="210" height="16"
    fill="white" opacity="0.28"
    clip-path="url(#v1-text-clip)"/>

  <!-- Thin glass stroke on text -->
  <text x="92" y="57"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-weight="800" font-size="40" letter-spacing="-2"
    fill="none"
    stroke="#C4B5FF" stroke-width="0.5" stroke-opacity="0.6">blent</text>
</svg>
