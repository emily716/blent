<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 90" width="300" height="90">
  <defs>
    <radialGradient id="lb-body" cx="38%" cy="32%" r="65%">
      <stop offset="0%"   stop-color="#C4B5FF" stop-opacity="0.55"/>
      <stop offset="45%"  stop-color="#7B5EFF" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#3A1FBB" stop-opacity="0.45"/>
    </radialGradient>
    <radialGradient id="lb-spec" cx="38%" cy="22%" r="45%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.92"/>
      <stop offset="60%"  stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="lb-refl" cx="50%" cy="88%" r="45%">
      <stop offset="0%"   stop-color="#B8F05A" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#B8F05A" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="lb-text-clip">
      <text x="92" y="57"
        font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-weight="800" font-size="40" letter-spacing="-2">blent</text>
    </clipPath>
    <filter id="lb-shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="4" stdDeviation="6"
        flood-color="#5533CC" flood-opacity="0.28"/>
    </filter>
  </defs>
  <circle cx="44" cy="44" r="36"
    fill="none" stroke="#7B5EFF" stroke-width="1" opacity="0.18"/>
  <circle cx="44" cy="44" r="33"
    fill="url(#lb-body)"
    stroke="#C4B5FF" stroke-width="0.8" stroke-opacity="0.6"
