<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 90" width="300" height="90">
  <defs>
    <radialGradient id="lg-body" cx="38%" cy="32%" r="65%">
      <stop offset="0%"   stop-color="#E8FFAD" stop-opacity="0.75"/>
      <stop offset="45%"  stop-color="#C8F577" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#7AB52A" stop-opacity="0.7"/>
    </radialGradient>
    <radialGradient id="lg-spec" cx="38%" cy="22%" r="45%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="60%"  stop-color="#ffffff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="lg-refl" cx="50%" cy="88%" r="45%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="lg-shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="4" stdDeviation="6"
        flood-color="#4A8A00" flood-opacity="0.3"/>
    </filter>
    <filter id="lg-text-glow" x="-5%" y="-20%" width="110%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4"
        flood-color="#C8F577" flood-opacity="0.5"/>
    </filter>
  </defs>
  <circle cx="44" cy="44" r="36"
    fill="none" stroke="#C8F577" stroke-width="1" opacity="0.3"/>
  <circle cx="44" cy="44" r="33"
    fill="url(#lg-body)"
    stroke="#E8FFAD" stroke-width="0.8" stroke-opacity="0.6"
    filter="url(#lg-shadow)"/>
  <circle cx="44" cy="44" r="33" fill="url(#lg-refl)"/>
  <ellipse cx="35" cy="30" rx="16" ry="10" fill="url(#lg-spec)"/>
  <ellipse cx="31" cy="26" rx="5" ry="3" fill="white" opacity="0.75"/>
  <path d="M 62 55 A 33 33 0 0 1 26 68"
    fill="none" stroke="white" stroke-width="0.8"
    stroke-opacity="0.22" stroke-linecap="round"/>
  <text x="92" y="57"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-weight="800" font-size="40" letter-spacing="-2"
    fill="#C8F577"
    filter="url(#lg-text-glow)">blent</text>
</svg>
