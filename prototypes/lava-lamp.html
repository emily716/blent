<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>blent — Lava Lamp</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#0B0B0B}
canvas{display:block;width:100%;height:100%}
</style>
</head>
<body>
<canvas id="lava-canvas"></canvas>
<script>
(function(){
'use strict';

const canvas = document.getElementById('lava-canvas');
const gl = canvas.getContext('webgl', {alpha: false, antialias: false});
if (!gl) { document.body.style.background='#5E4ADA'; return; }

const VS = `
attribute vec2 a_pos;
void main(){gl_Position=vec4(a_pos,0,1);}
`;

const FS = `
precision highp float;
uniform vec2 u_res;
uniform float u_time;
uniform float u_scroll;
uniform vec3 u_blobs[24];
uniform int u_count;

float hash(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453);}
float noise(vec2 p){
  vec2 i=floor(p),f=fract(p);
  f=f*f*(3.0-2.0*f);
  return mix(mix(hash(i),hash(i+vec2(1,0)),f.x),
             mix(hash(i+vec2(0,1)),hash(i+vec2(1,1)),f.x),f.y);
}
float fbm(vec2 p){
  float v=0.0,a=0.5;
  for(int i=0;i<4;i++){v+=a*noise(p);p*=2.1;a*=0.5;}
  return v;
}

float field(vec2 p){
  float f=0.0;
  for(int i=0;i<24;i++){
    if(i>=u_count) break;
    vec2 d=p-u_blobs[i].xy;
    float r=u_blobs[i].z;
    f+=r*r/(dot(d,d)+0.0001);
  }
  return f;
}

void main(){
  vec2 uv=gl_FragCoord.xy/u_res;
  float aspect=u_res.x/u_res.y;
  vec2 p=vec2(uv.x*aspect,uv.y);

  float f=field(p);

  float surface=smoothstep(0.85,1.15,f);
  if(surface<0.01){
    gl_FragColor=vec4(vec3(0.043),1.0); // #0B0B0B background
    return;
  }

  float eps=0.003;
  float fx=field(p+vec2(eps,0))-field(p-vec2(eps,0));
  float fy=field(p+vec2(0,eps))-field(p-vec2(0,eps));
  vec3 normal=normalize(vec3(-fx,-fy,0.45));

  float turb=fbm(p*8.0+u_time*0.15);
  float turb2=fbm(p*14.0-u_time*0.08);

  vec3 light1=normalize(vec3(0.4,-0.6,1.0));
  vec3 light2=normalize(vec3(-0.5,0.3,0.8));
  vec3 viewDir=vec3(0,0,1);

  float diff1=max(dot(normal,light1),0.0);
  float diff2=max(dot(normal,light2),0.0);

  float spec1=pow(max(dot(reflect(-light1,normal),viewDir),0.0),45.0);
  float spec2=pow(max(dot(reflect(-light2,normal),viewDir),0.0),35.0);

  float fresnel=pow(1.0-max(dot(normal,viewDir),0.0),3.0);

  vec3 basePurple=vec3(0.369,0.290,0.855);
  vec3 deepPurple=vec3(0.15,0.08,0.45);
  vec3 highlight=vec3(0.86,1.0,0.83);

  vec3 baseColor=mix(deepPurple,basePurple,0.5+0.5*turb);
  baseColor=mix(baseColor,highlight,turb2*0.08);

  float diffuse=diff1*0.7+diff2*0.3;
  float specular=spec1*0.9+spec2*0.4;

  vec3 color=baseColor*(0.25+0.75*diffuse);
  color+=vec3(1.0,0.95,0.9)*specular*0.85;
  color+=basePurple*fresnel*0.3;

  color*=0.92+0.08*turb;

  float edge=smoothstep(0.85,1.4,f);
  color*=0.7+0.3*edge;

  gl_FragColor=vec4(color,1.0);
}
`;

function createShader(type, src){
  const s=gl.createShader(type);
  gl.shaderSource(s,src);
  gl.compileShader(s);
  if(!gl.getShaderParameter(s,gl.COMPILE_STATUS)){
    console.error(gl.getShaderInfoLog(s));
    return null;
  }
  return s;
}
const vs=createShader(gl.VERTEX_SHADER,VS);
const fs=createShader(gl.FRAGMENT_SHADER,FS);
const prog=gl.createProgram();
gl.attachShader(prog,vs);
gl.attachShader(prog,fs);
gl.linkProgram(prog);
if(!gl.getProgramParameter(prog,gl.LINK_STATUS)){
  console.error(gl.getProgramInfoLog(prog));
}
gl.useProgram(prog);

const buf=gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER,buf);
gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,1,-1,-1,1,1,1]),gl.STATIC_DRAW);
const aPos=gl.getAttribLocation(prog,'a_pos');
gl.enableVertexAttribArray(aPos);
gl.vertexAttribPointer(aPos,2,gl.FLOAT,false,0,0);

const uRes=gl.getUniformLocation(prog,'u_res');
const uTime=gl.getUniformLocation(prog,'u_time');
const uScroll=gl.getUniformLocation(prog,'u_scroll');
const uCount=gl.getUniformLocation(prog,'u_count');
const uBlobs=[];
for(let i=0;i<24;i++) uBlobs[i]=gl.getUniformLocation(prog,'u_blobs['+i+']');

const NUM_BLOBS = 22;

// Logo target positions — blent badge shape (SVG viewBox: 0 0 201 247)
function getLogoTargets(aspect){
  const scale=0.55;
  const svgW=201, svgH=247;
  const logoH=scale;
  const logoWA=(logoH*(svgW/svgH));
  const ox=(aspect-logoWA)/2;
  const oy=(1-logoH)/2;

  function s(sx,sy){
    return [ox+logoWA*(sx/svgW), oy+logoH*(sy/svgH)];
  }

  return [
    // Badge outline
    s(18, 0),    s(61, 0),    s(98, 38),   s(118, 41),
    s(170, 70),  s(200, 124), s(192, 216),  s(169, 238),
    s(139, 247), s(115, 247), s(81, 247),   s(39, 247),
    s(12, 227),  s(0, 209),   s(0, 18),
    // Letter anchors (b-l-e-n-t)
    s(48, 140),  s(76, 140),  s(102, 140),  s(138, 140),  s(168, 140),
    // Fill
    s(100, 80),  s(100, 200),
  ];
}

const blobs = [];
for(let i=0;i<NUM_BLOBS;i++){
  blobs.push({
    x: 0.3+Math.random()*1.2,
    y: 1.2+Math.random()*0.8,
    vx: (Math.random()-0.5)*0.002,
    vy: -0.003-Math.random()*0.004,
    radius: 0.06+Math.random()*0.09,
    baseRadius: 0.06+Math.random()*0.09,
    phase: Math.random()*Math.PI*2,
    speed: 0.3+Math.random()*0.7,
    wobbleX: Math.random()*0.3,
    wobbleY: Math.random()*0.2,
    drag: 0.92+Math.random()*0.06,
  });
}

let scrollFrac = 0;
let scrollVel = 0;
let time = 0;
let w=0, h=0, aspect=1;
let pourProgress = 0;

// Accept external scroll input via postMessage or mouse wheel
let virtualScroll = 0;
window.addEventListener('wheel',(e)=>{
  virtualScroll += e.deltaY*0.0003;
  virtualScroll = Math.max(0, Math.min(1, virtualScroll));
  e.preventDefault();
},{passive:false});

// Also accept postMessage for embedding
window.addEventListener('message',(e)=>{
  if(e.data && typeof e.data.scroll === 'number'){
    virtualScroll = e.data.scroll;
  }
});

function resize(){
  const dpr = Math.min(window.devicePixelRatio||1, 1.5);
  w = window.innerWidth;
  h = window.innerHeight;
  canvas.width = Math.floor(w*dpr*0.65);
  canvas.height = Math.floor(h*dpr*0.65);
  canvas.style.width = w+'px';
  canvas.style.height = h+'px';
  aspect = w/h;
  gl.viewport(0,0,canvas.width,canvas.height);
}
resize();
window.addEventListener('resize',resize);

let prevScroll = 0;

function animate(ts){
  requestAnimationFrame(animate);
  time = ts*0.001;

  scrollFrac = virtualScroll;
  scrollVel = (scrollFrac - prevScroll)*60;
  prevScroll = scrollFrac;

  pourProgress = Math.min(pourProgress+0.016, 1.0);

  const targets = getLogoTargets(aspect);

  const coalesceStart = 0.65;
  const coalesceFrac = scrollFrac > coalesceStart ?
    Math.min((scrollFrac-coalesceStart)/(1-coalesceStart), 1) : 0;
  const coalescePow = coalesceFrac*coalesceFrac*coalesceFrac;

  for(let i=0;i<NUM_BLOBS;i++){
    const b = blobs[i];
    const stagger = i/NUM_BLOBS;

    const pourT = Math.max(0, Math.min(1, (pourProgress-stagger*0.5)*2));
    const pourEase = pourT*pourT*(3-2*pourT);

    if(pourT < 1){
      b.y = 1.2 - pourEase * (0.5 + stagger*0.4);
      b.vy = -pourEase*0.005;
    }

    const wobbleT = time*b.speed;
    const floatX = Math.sin(wobbleT+b.phase)*b.wobbleX*0.15;
    const floatY = Math.cos(wobbleT*0.7+b.phase*1.3)*b.wobbleY*0.1;

    b.vx += scrollVel*0.003*(1+Math.sin(b.phase));
    b.vy += scrollVel*0.005;

    const cx = aspect*0.5;
    const cy = 0.5;
    b.vx += (cx-b.x)*0.0003;
    b.vy += (cy-b.y)*0.0003;

    b.vx *= b.drag;
    b.vy *= b.drag;
    b.x += b.vx + floatX*0.01;
    b.y += b.vy + floatY*0.01;

    if(coalescePow > 0 && i < targets.length){
      const tx = targets[i][0];
      const ty = targets[i][1];
      b.x = b.x*(1-coalescePow) + tx*coalescePow;
      b.y = b.y*(1-coalescePow) + ty*coalescePow;
      b.radius = b.baseRadius*(1-coalescePow*0.3);
    } else {
      b.radius = b.baseRadius*(1+0.1*Math.sin(wobbleT*1.3));
    }

    if(b.x < 0.05*aspect){b.x=0.05*aspect;b.vx*=-0.5;}
    if(b.x > 0.95*aspect){b.x=0.95*aspect;b.vx*=-0.5;}
    if(b.y < 0.05){b.y=0.05;b.vy*=-0.5;}
    if(b.y > 0.95){b.y=0.95;b.vy*=-0.5;}
  }

  gl.clearColor(0.043,0.043,0.043,1);
  gl.clear(gl.COLOR_BUFFER_BIT);

  gl.uniform2f(uRes,canvas.width,canvas.height);
  gl.uniform1f(uTime,time);
  gl.uniform1f(uScroll,scrollFrac);
  gl.uniform1i(uCount,NUM_BLOBS);

  for(let i=0;i<NUM_BLOBS;i++){
    gl.uniform3f(uBlobs[i],blobs[i].x,blobs[i].y,blobs[i].radius);
  }

  gl.drawArrays(gl.TRIANGLE_STRIP,0,4);
}

requestAnimationFrame(animate);
})();
</script>
</body>
</html>
