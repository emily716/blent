<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="320" height="80">
  <defs>
    <!-- Bubble gradients -->
    <radialGradient id="g1" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#7B5EFF" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#4A2FD4" stop-opacity="0.7"/>
    </radialGradient>
    <radialGradient id="g2" cx="55%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#B8F05A" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#7EC817" stop-opacity="0.75"/>
    </radialGradient>
    <radialGradient id="g3" cx="35%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#5A3FE8" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#2D1FA8" stop-opacity="0.6"/>
    </radialGradient>
    <!-- Soft blur filter for depth -->
    <filter id="blur-sm" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.2"/>
    </filter>
    <filter id="blur-xs" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="0.5"/>
    </filter>
  </defs>

  <!-- BUBBLE CLUSTER — three overlapping organic circles -->
  <!-- Back bubble (darkest, slightly blurred) -->
  <ellipse cx="28" cy="44" rx="18" ry="17"
    fill="url(#g3)" filter="url(#blur-sm)" opacity="0.7"/>

  <!-- Mid bubble (green accent) -->
  <ellipse cx="46" cy="34" rx="20" ry="19"
    fill="url(#g2)" opacity="0.88"/>

  <!-- Front bubble (purple, sharpest) -->
  <ellipse cx="34" cy="52" rx="16" ry="15"
    fill="url(#g1)" opacity="0.92"/>

  <!-- Tiny highlight specular on green bubble -->
  <ellipse cx="41" cy="27" rx="5" ry="3.5"
    fill="white" opacity="0.22" filter="url(#blur-xs)"/>

  <!-- Tiny highlight on purple bubble -->
  <ellipse cx="29" cy="45" rx="4" ry="2.5"
    fill="white" opacity="0.18" filter="url(#blur-xs)"/>

  <!-- WORDMARK — clean, heavy, tight tracking -->
  <text
    x="78" y="55"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-weight="800"
    font-size="38"
    letter-spacing="-1.5"
    fill="#7B5EFF">blent</text>
</svg>
